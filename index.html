<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نور القرآن</title>

    <!-- Links -->
     <link rel="icon" href="icon.png">
    <!-- Style links -->
     <link rel="stylesheet" href="Style/style.css">
     <link rel="stylesheet" href="Style/body.css">
     <link rel="manifest" href="Script/manifest.json">
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&amp;display=swap" rel="stylesheet">
    <!-- Script links -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body class="body">
    <!-- header -->
    <header>
      <div class="flexe">
        <button class="Toggle x-btn" id="favToggle" onclick="window.location.href='favorites.html'; clearFavoritesBadge();"><ion-icon name="heart-outline"></ion-icon> <xx style="display:none"></xx></button>
      </div>
      <div class="flexe">
        <button class="Toggle x-btn" id="themeToggle"><ion-icon id="themeIcon" name="moon-outline"></ion-icon></button>
      </div>
    </header>

    <!-- decoment -->
    <div class="decoment">
        <text class="text">مرحبا بك في نور القرآن</text>
        <div class="searsh">
            <div class="flex">
                <div class="dropdown">
                    <button class="toggle de-btn x-btn"><ion-icon name="options-outline"></ion-icon></button>
                    <div class="menu" id="filter-div">
                      <a data-cat="الكل" class="coco">الكل</a>
                    </div>
                </div>
                
                <input id="search-input" type="search" placeholder="إبحث بالنص او بالقسم...">
                <button class="de-btn"><ion-icon name="search-outline"></ion-icon></button>
            </div>
            
            <!-- -- -->
            <div class="results" id="results-div">
                <div id="results-grid"></div>
            </div>
        </div>
        <h3 class="vcccc">آخر الفيديوهات المشاهدة <button id="delete-history" class="de-btn x-btn"><ion-icon name="trash-outline"></ion-icon></button></h3>

        <div class="history scroll-container" id="history-div">
            <div id="history-grid"></div>
        </div>

        <div class="stats">
          <div class="stat">
            <span class="count" data-target="34">0</span>
            <p>القراء</p>
          </div>
        
          <div class="stat">
            <span class="count" data-target="4246">0</span>
            <p>الفيدوهات</p>
          </div>
        </div>
        
    </div>

    <!--
      ✅ data.js فقط — يحتوي على الدوال والـ CATEGORIES والـ Proxy
      ❌ data-raw.js لا يُحمَّل هنا — يُحمَّل تلقائياً عند أول بحث فقط
    -->
    <script src="Script/data.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js');
        }
    </script>

    <script>
        if (window.matchMedia('(display-mode: standalone)').matches) {
          document.body.style.overflowY = "hidden";
        } else {
          document.body.style.overflowY = "auto";
        }
    </script>



    <div class="install-container">
      <div id="install-container">
        <div class="install"><a style="background-image: url(icon.png);"></a></div>
        <span>نور القرآن</span>
        <button class="Download-app">تثبيت التطبيق</button>
      </div>
    </div>


    <script>
    let deferredPrompt;

function isAppInstalled() {
  return window.matchMedia('(display-mode: standalone)').matches 
         || window.navigator.standalone === true;
}

function showInstallMessage() {
  const installBtn = document.querySelector(".Download-app");
  const container = document.getElementById("install-container");

  if (!installBtn || !container) return;

  // إخفاء إذا مثبت
  if (isAppInstalled() || localStorage.getItem("appInstalled") === "true") {
    container.style.display = "none";
    return;
  }

  // 🔥 إظهار فقط إذا التثبيت الحقيقي متاح
  if (deferredPrompt) {
    container.style.display = "block";
  }

  installBtn.onclick = async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;

    if (result.outcome === 'accepted') {
      localStorage.setItem("appInstalled", "true");
      container.style.display = "none";
    }

    deferredPrompt = null;
  };
}

// ✅ الحدث الحقيقي الوحيد للتثبيت
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallMessage();
});

window.addEventListener('appinstalled', () => {
  localStorage.setItem("appInstalled", "true");

  const container = document.getElementById("install-container");
  if (container) container.style.display = "none";
});

// إخفاء بالبداية
window.addEventListener("load", () => {
  const container = document.getElementById("install-container");
  if (container) container.style.display = "none";
});
    </script>

    <script src="Script/app.js"></script>
    <script src="Script/myscript.js"></script>
    <script src="Script/script.js"></script>

<script>
  if (localStorage.getItem("site-theme") === "dark-mode") {
    document.documentElement.classList.add("dark-mode");
  }
</script>
<script>
  // تحديث badge المفضلة عند تحميل الصفحة
  document.addEventListener("DOMContentLoaded", () => {
    updateFavBadge();
  });
</script>
</body>
</html>
