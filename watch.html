<html lang="ar" dir="rtl"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VidHub – مشاهدة</title>
  <link rel="icon" href="icon.png">
  <link rel="stylesheet" href="Style/body.css">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&amp;display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <style>
    :root {
    --bg: #0a0a0f;
    --surface: #13131a00;
    /* --card: #1a1a24; */
    --border: #b8b8ba;
    --accent: #e63946;
    --accent2: #ff6b6b;
    --gold: #f4a261;
    /* --text: #f0f0f5; */
    --muted: #8888aa;
    --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf9f4;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #faf9f4;
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 900;
      color: var(--text);
      text-decoration: none;
      flex-shrink: 0;
    }
    .logo span { color: #177ccb; }

    .nav-links {
      display: flex;
      gap: 8px;
      margin-right: auto;
    }

    .nav-btn {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 30px;
      transition: all .2s;
      direction: ltr;
    }
    .nav-btn:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    /* ===== LAYOUT ===== */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 32px;
      align-items: start;
    }

    /* ===== VIDEO COLUMN ===== */
    .video-col {}

    /* ===== PLAYER ===== */
    .player-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: var(--radius);
      overflow: hidden;
      background: #ecc79330;
      display: flex;
      align-items: center;
      justify-content: center;
      /* box-shadow: 0 20px 60px rgba(0,0,0,.6); */
    }
    .player-wrap::before {
      position: absolute;
      content: 'جارِ تحميل الفيديو...';
      direction: rtl;
      font-size: 14px;
      font-weight: 600;
      color: #177ccb;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .player-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* player-mp3 */
    .player-mp3 {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 7px;
      background: #fff;
      border-radius: 25px;
      margin: 3px;
      box-shadow: 0px 1px 3px #8888aa5c;
      display: none;
      z-index: 20;
    }

    /* عند إضافة كلاس xoox للـ body يظهر player-mp3 */
    body.xoox .player-mp3 {
      display: flex !important;
    }

    /* عند xoox إخفاء الـ iframe وإظهار الخلفية فقط */
    body.xoox .player-wrap {
      padding-top: 60px;
    }
    body.xoox .player-wrap iframe {
      opacity: 0;
      pointer-events: none;
    }

    .player1 {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 30px;
      background: rgb(21, 137, 245);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .playe2 {
      flex: 1 1;
      height: 6px;
      margin: 0 10px;
      border-radius: 5px;
      background: #8888aa21;
      text-align: -webkit-left;
      cursor: pointer;
      position: relative;
      touch-action: none;
    }
    .playe2 a {
      position: relative;
      height: 100%;
      display: block;
      width: 0%;
      background: rgb(21, 137, 245);
      display: flex;
      align-items: center;
      border-radius: 5px;
      pointer-events: none;
    }
    .playe2 a::after {
      position: absolute;
      z-index: 5;
      content: '';
      right: -7.5px;
      padding: 7.5px;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 0 0 2px #1589f5 inset;
    }
    .player3 {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 30px;
      background: #0000;
      color: #2b2b30d4;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .player3:hover {
      background-color: #25262913;
    }

    /* player-open */
    .player-open {
      position: absolute;
      z-index: 10;
      top: 0;
      left: 0;
      width: 34px;
      height: 34px;
      font-size: 24px;
      border: none;
      background: #0000;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    

    .video-meta {
      margin-top: 20px;
    }

    .video-title {
      font-size: 1.3rem;
      font-weight: 800;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 10px;
    }

    .video-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      user-select: text !important;
    }
    .badge.cat { 
      user-select: none !important;
      border-color: #177ccb33;
      background-color: #1d82cf23 !important;
      color: rgb(21, 137, 245);
     }
    .cate {
      transition: all .3s;
      cursor: pointer;
      user-select: none !important;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 4px 14px;
      padding-left: 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
    }
    .cate svg {
      transition: all .3s;
      fill: var(--muted) !important;
      height: 18px;
      width: 18px;
      margin-right: 8px;
    }
    .cate.active {
      border-color: #177ccb33;
      background-color: #1d82cf23 !important;
      color: rgb(21, 137, 245);
    }
    .cate.active svg {
      fill: rgb(21, 137, 245) !important;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {}

    .sidebar-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .suggested-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sugg-card {
      display: flex;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid #0000;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color .2s, transform .15s;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .sugg-card:hover {
      /* border-color: rgba(255, 145, 0, 0.74); */
      transform: translateX(-3px);
    }

    .sugg-thumb {
      height: 73px;
      width: 130px;
      flex-shrink: 0;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    border-radius: 10px;
    }

    .sugg-info {
      flex: 1;
      padding: 10px 0px 10px 12px;
      padding-bottom: 5px;
      display: flex;
      flex-direction: column;
      /* justify-content: center; */
      gap: 4px;
    }

    .sugg-title {
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: black !important;
    }

    .sugg-cat {
      font-size: 0.68rem;
      color: #177ccb;
      font-weight: 700;
    }

    /* Loading state */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        padding: 16px;
      }
      header { padding: 12px 16px; }
      .logo { font-size: 1.3rem; }
      .video-title { font-size: 1.1rem; }
      .sugg-thumb { width: 110px; }
    }
    .coco2 {
      background: #0085c736 !important;
      outline: 5px solid #0085c736 !important;
    }

    .xoox .player-wrap {
      background-color: #0000;
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html"><span>نـ</span>ور القرآن</a>
  <div class="nav-links">
    <a class="nav-btn" id="back-section" href="section.html?cat=%D8%A8%D8%B4%D8%B1%D8%A9">← القسم</a>
    <a class="nav-btn" href="index.html" style="
    background: #177ccb;
    color: #fff;
    border-color: #0000;
">الرئيسية</a>
  </div>
</header>

<main>

  <!-- VIDEO COLUMN -->
  <div class="video-col">

    <!-- PLAYER -->
    <div class="player-wrap">
      <button class="player-open"><ion-icon name="chevron-collapse"></ion-icon></button>
      <iframe
        id="yt-player"
        src=""
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
      
      <div class="player-mp3">
        <button class="player1"><ion-icon name="play-outline"></ion-icon></button>
        <div class="playe2"><a></a></div>
        <button class="player3"><ion-icon name="chevron-expand"></ion-icon></button>
      </div>

    <!-- META -->
    <div class="video-meta">
      <h1 class="video-title" id="video-title">تحميل...</h1>
      <div class="video-badges">
        <span class="badge cat" id="video-cat">—</span>
        <a class="cate" id="auto-next-btn">
          الإنتقال
          <svg xmlns="http://www.w3.org/2000/svg" width="800px" height="800px" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M5.23331,0.493645 C6.8801,-0.113331 8.6808,-0.161915 10.3579,0.355379 C11.4019,0.6773972 12.361984,1.20757325 13.1838415,1.90671757 L13.4526,2.14597 L14.2929,1.30564 C14.8955087,0.703065739 15.9071843,1.0850774 15.994017,1.89911843 L16,2.01275 L16,6.00002 L12.0127,6.00002 C11.1605348,6.00002 10.7153321,5.01450817 11.2294893,4.37749065 L11.3056,4.29291 L12.0372,3.56137 C11.389,2.97184 10.6156,2.52782 9.76845,2.26653 C8.5106,1.87856 7.16008,1.915 5.92498,2.37023 C4.68989,2.82547 3.63877,3.67423 2.93361,4.78573 C2.22844,5.89723 1.90836,7.20978 2.02268,8.52112 C2.13701,9.83246 2.6794,11.0698 3.56627,12.0425 C4.45315,13.0152 5.63528,13.6693 6.93052,13.9039 C8.22576,14.1385 9.56221,13.9407 10.7339,13.3409 C11.9057,12.7412 12.8476,11.7727 13.4147,10.5848 C13.6526,10.0864 14.2495,9.8752 14.748,10.1131 C15.2464,10.351 15.4575,10.948 15.2196,11.4464 C14.4635,13.0302 13.2076,14.3215 11.6453,15.1213 C10.0829,15.921 8.30101,16.1847 6.57402,15.8719 C4.84704,15.559 3.27086,14.687 2.08836,13.39 C0.905861,12.0931 0.182675,10.4433 0.0302394,8.69483 C-0.122195,6.94637 0.304581,5.1963 1.2448,3.7143 C2.18503,2.2323 3.58652,1.10062 5.23331,0.493645 Z M6,5.46077 C6,5.09472714 6.37499031,4.86235811 6.69509872,5.0000726 L6.7678,5.03853 L10.7714,7.57776 C11.0528545,7.75626909 11.0784413,8.14585256 10.8481603,8.36273881 L10.7714,8.42224 L6.7678,10.9615 C6.45867857,11.1575214 6.06160816,10.965274 6.00646097,10.6211914 L6,10.5392 L6,5.46077 Z"/></svg>
        </a>
        <span class="badge" id="video-id-badge">—</span>
      </div>
    </div>

  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">مقترحات من نفس القسم</div>
    <div class="suggested-list" id="suggested-list">
      <div class="loading-state">⏳ جاري التحميل...</div>
    </div>
  </aside>

</main>

<script src="Script/app.js"></script>
<script src="Script/data.js"></script>
<script>
const params  = new URLSearchParams(location.search);
  const videoId = params.get('id');
  const cat     = params.get('cat') || 'شائعة';

  const player      = document.getElementById('yt-player');
  const titleEl     = document.getElementById('video-title');
  const catEl       = document.getElementById('video-cat');
  const idBadge     = document.getElementById('video-id-badge');
  const backBtn     = document.getElementById('back-section');
  const suggList    = document.getElementById('suggested-list');
  const autoNextBtn = document.getElementById('auto-next-btn');

  // ===== عناصر player-mp3 =====
  const playerOpenBtn = document.querySelector('.player-open');
  const playerMp3     = document.querySelector('.player-mp3');
  const playPauseBtn  = document.querySelector('.player1');
  const progressBar   = document.querySelector('.playe2');
  const progressFill  = document.querySelector('.playe2 a');
  const closeBtn      = document.querySelector('.player3');

  // ===== فتح وضع MP3 عند النقر على player-open =====
  playerOpenBtn.addEventListener('click', () => {
    document.body.classList.add('xoox');
  });

  // ===== إغلاق وضع MP3 عند النقر على player3 =====
  closeBtn.addEventListener('click', () => {
    document.body.classList.remove('xoox');
  });

  // ===== شريط التقدم (يعمل باللمس والنقر) =====
  let isDragging = false;

  function setProgressFromEvent(e) {
    const rect = progressBar.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let ratio = (clientX - rect.left) / rect.width;
    ratio = Math.max(0, Math.min(1, ratio));
    progressFill.style.width = (ratio * 100) + '%';
    // إرسال أمر seek لليوتيوب
    try {
      const duration = ytDuration || 0;
      if (duration > 0) {
        const seekTo = Math.floor(ratio * duration);
        player.contentWindow.postMessage(
          JSON.stringify({ event: 'command', func: 'seekTo', args: [seekTo, true] }), '*'
        );
      }
    } catch (_) {}
  }

  // Mouse events
  progressBar.addEventListener('mousedown', (e) => {
    isDragging = true;
    setProgressFromEvent(e);
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (isDragging) setProgressFromEvent(e);
  });
  document.addEventListener('mouseup', () => { isDragging = false; });

  // Touch events
  progressBar.addEventListener('touchstart', (e) => {
    isDragging = true;
    setProgressFromEvent(e);
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (isDragging) setProgressFromEvent(e);
  }, { passive: true });
  document.addEventListener('touchend', () => { isDragging = false; });

  // ===== زر التشغيل/إيقاف =====
  let mp3Playing = false;
  playPauseBtn.addEventListener('click', () => {
    try {
      if (mp3Playing) {
        player.contentWindow.postMessage(
          JSON.stringify({ event: 'command', func: 'pauseVideo', args: [] }), '*'
        );
        playPauseBtn.innerHTML = '<ion-icon name="play-outline"></ion-icon>';
        mp3Playing = false;
      } else {
        player.contentWindow.postMessage(
          JSON.stringify({ event: 'command', func: 'playVideo', args: [] }), '*'
        );
        playPauseBtn.innerHTML = '<ion-icon name="pause-outline"></ion-icon>';
        mp3Playing = true;
      }
    } catch (_) {}
  });

  // ===== Wake Lock: منع إغلاق الشاشة =====
  let wakeLock = null;

  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (_) {}
  }

  async function releaseWakeLock() {
    if (!wakeLock) return;
    try {
      await wakeLock.release();
      wakeLock = null;
    } catch (_) {}
  }

  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && isPlaying) {
      await requestWakeLock();
    }
  });

  // ===== حالة الانتقال التلقائي =====
  let autoNext = localStorage.getItem('autoNext') === 'true';
  let isPlaying = false;
  let ytDuration = 0;
  let ytCurrentTime = 0;

  function applyAutoNextStyle() {
    autoNextBtn.classList.toggle('active', autoNext);
  }

  autoNextBtn.addEventListener('click', () => {
    autoNext = !autoNext;
    localStorage.setItem('autoNext', autoNext);
    applyAutoNextStyle();
  });

  applyAutoNextStyle();

  backBtn.href = `section.html?cat=${encodeURIComponent(cat)}`;
  catEl.textContent   = cat;
  idBadge.textContent = videoId || '—';

  // ===== قائمة الفيديوهات =====
  const catVideos  = DATA[cat] || [];
  const currentIdx = catVideos.findIndex(v => v.id === videoId);
  const nextVideo  = catVideos[currentIdx + 1] || null;

  if (!videoId) {
    titleEl.textContent = 'فيديو غير موجود';
  } else {
    player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&enablejsapi=1`;

    // ===== رصد حالة الفيديو =====
    window.addEventListener('message', async (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.event === 'infoDelivery' && data.info) {
          const info = data.info;

          // تحديث مدة الفيديو
          if (info.duration !== undefined && info.duration > 0) {
            ytDuration = info.duration;
          }

          // تحديث الوقت الحالي وشريط التقدم
          if (info.currentTime !== undefined && ytDuration > 0 && !isDragging) {
            ytCurrentTime = info.currentTime;
            const ratio = ytCurrentTime / ytDuration;
            progressFill.style.width = (ratio * 100) + '%';
          }

          if (info.playerState !== undefined) {
            const state = info.playerState;

            if (state === 1) {
              isPlaying = true;
              mp3Playing = true;
              playPauseBtn.innerHTML = '<ion-icon name="pause-outline"></ion-icon>';
              await requestWakeLock();
            }
            if (state === 2 || state === -1) {
              isPlaying = false;
              mp3Playing = false;
              playPauseBtn.innerHTML = '<ion-icon name="play-outline"></ion-icon>';
              await releaseWakeLock();
            }
            if (state === 0) {
              isPlaying = false;
              mp3Playing = false;
              playPauseBtn.innerHTML = '<ion-icon name="play-outline"></ion-icon>';
              await releaseWakeLock();
              if (autoNext && nextVideo) {
                window.location.href = `watch.html?id=${nextVideo.id}&cat=${encodeURIComponent(nextVideo.category)}`;
              }
            }
          }
        }
      } catch (_) {}
    });

    player.addEventListener('load', () => {
      setInterval(() => {
        try {
          player.contentWindow.postMessage('{"event":"listening"}', '*');
          player.contentWindow.postMessage(
            JSON.stringify({ event: 'command', func: 'getPlayerState', args: [] }), '*'
          );
        } catch (_) {}
      }, 1000);
    });

    // ===== جلب عنوان الفيديو الحالي =====
    fetchVideoTitle(videoId).then(title => {
      titleEl.textContent = title;
      const current = catVideos.find(v => v.id === videoId) || { id: videoId, category: cat };
      addToWatchHistory({ ...current, title });
    });

    // ===== بناء قائمة المقترحات =====
    const prevVideo  = currentIdx > 0 ? catVideos[currentIdx - 1] : null;
    const afterCurrent = catVideos.slice(currentIdx + 1, currentIdx + 9);

    const rawPool = [
      ...(prevVideo ? [prevVideo] : []),
      catVideos[currentIdx],
      ...afterCurrent
    ].slice(0, 10);

    function renderSugg(list) {
      if (!list.length) {
        suggList.innerHTML = '<p style="color:var(--muted);font-size:.85rem;padding:20px 0">لا توجد مقترحات</p>';
        return;
      }
      suggList.innerHTML = list.map((v, i) => {
        const isCurrent = v.id === videoId;
        return `
        <a class="sugg-card${isCurrent ? ' coco2' : ''}"
           href="watch.html?id=${v.id}&cat=${encodeURIComponent(v.category)}"
           style="animation-delay:${i * 50}ms"
           onclick="addToWatchHistory(${JSON.stringify(v).replace(/"/g,'&quot;')})">
          <img class="sugg-thumb" src="${getYoutubeThumbnail(v.id)}" alt="${v.title}" loading="lazy" />
          <div class="sugg-info">
            <div class="sugg-title" id="st-${v.id}">${v.title}</div>
            <span class="sugg-cat">${v.category}</span>
          </div>
        </a>`;
      }).join('');
    }

    renderSugg(rawPool);

    enrichVideos(rawPool).then(enriched => {
      enriched.forEach(v => {
        const el = document.getElementById('st-' + v.id);
        if (el) el.textContent = v.title;
      });
    });
  }
</script>


</body>
</html>
